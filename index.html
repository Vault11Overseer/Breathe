<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta http-equiv="X-UA-Compatible" content="ie=edge" />
	<link rel="shortcut icon" type="image/webp" href="./assets/images/logo.webp" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">
	<link rel="stylesheet" href="./css/index.css">
	<link rel="stylesheet" href="./css/media.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">
	<title>Breathe 2.0</title>
</head>

<body>
	<div id="background">

		<!-- NAVIGATION -->
		<header id="Header">
			<!-- NAVIGATION LINKS -->
			<ul class='navbar'>
				<li><a style="background-color: rgb(53, 56, 70);" onclick="changeBackground('tree', 'templetree')"
						id="templetree" class='nav_link'>Temple</a></li>
				<li><a style="background-color: rgb(10, 20, 82);" onclick="changeBackground('mountain', 'mountaintop')"
						id="mountaintop" class='nav_link'>Mountain</a></li>
				<li><a style="background-color: rgb(100, 10, 10);" onclick="changeBackground('redshift', 'redshift')"
						id="redshift" class='nav_link'>Red
						Shift</a></li>
				<li><a style="background-color: rgb(77, 42, 14);" onclick="changeBackground('temple', 'temple')"
						id="temple" class='nav_link'>Monastery</a>
				</li>
				<li><a style="background-color: rgb(0, 0, 0);" onclick="changeBackground('wormhole', 'wormhole')"
						id="wormhole" class='nav_link'>Wormhole</a>
				</li>
			</ul>

			<!-- HAMBURGER MENU -->
			<div class="hamburger">
				<span class="bar"></span>
				<span class="bar"></span>
				<span class="bar"></span>
			</div>
		</header>

		<!-- MAIN CONTROLLER -->
		<div class="main-container">

			<!-- CONTROL PANEL -->

			<!-- WELCOME + QUOTE SECTION -->
			<div class="left-column">
				<div>
					<h1 style="font-family: 'Sacramento', cursive;">Welcome & Relax</h1>
					<hr>
				</div>

				<div id="changeText" class="quote-container">
					<p id="quote-text">To resist change, to try to cling to life, is therefore like holding your
						breath, if you persist you kill yourself.</p>
					<h6 id="quote-author">~Alan Watts~</h6>
				</div>
			</div>

			<!-- MUSIC + BREATHING SIDE -->
			<div class="right-column">
				<!-- MUSIC PLAYER -->
				<div id="music">
					<div class="music-container" id="music-container">
						<div class="music-info">
							<h4 id="music-title"></h4>
							<div class="progress-container" id="progress-container">
								<div class="progress" id="progress"></div>
							</div>
						</div>
						<audio src="./assets/music/First Focus.mp3" id="audio"></audio>
						<div class="music-img-container">
							<img src="./assets/images/album_covers/First Focus.webp" alt="music-cover"
								id="music-cover" />
						</div>
						<div class="music-navigation">
							<button id="prev" class="action-btn">
								<i class="fas fa-backward"></i>
							</button>
							<button id="play" class="action-btn action-btn-big">
								<i class="fas fa-play"></i>
							</button>
							<button id="next" class="action-btn">
								<i class="fas fa-forward"></i>
							</button>
						</div>
					</div>
				</div>

				<!-- BREATHING TEXT -->
				<div class="breathe-container">
					<h2 class="breathe" id="breathe"><span>BREATHE IN!</span></h2>
				</div>
			</div>


		</div>

		<!-- CIRCLES -->
		<div id="circles">
			<div class="circle-container">
				<div class="circle"></div>
				<div class="circle"></div>
				<div class="circle"></div>
				<div class="circle"></div>
				<div class="circle"></div>
				<div class="circle"></div>
				<div class="circle"></div>
				<div class="circle"></div>
				<div class="circle"></div>
				<div class="circle"></div>
			</div>
		</div>

		<!-- FOOTER -->
		<div>
			<footer>
				<p>
					<script>document.write(new Date().getFullYear());</script> @
					<a href="https://jaredmatta.com/">
						<img src="./assets/images/logo.webp" alt="logo" class='footer-logo'
							style="width: 25px; height:25px;">
					</a>
				</p>
			</footer>
		</div>

	</div>

	<!-- SCRIPTS -->
	<script src="./js/music.js"></script>
	<script src="./js/media.js"></script>

</body>

</html>
